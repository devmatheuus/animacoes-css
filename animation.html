<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS - TRAINING ANIMATION</title>
    <link rel="stylesheet" href="css/default.css" />
    <link rel="stylesheet" href="css/animation.css" />
  </head>
  <body>
    <h1>Animações</h1>

    <h2>Hover</h2>
    <section>
      <div class="item blue animationFadeIn">Azul</div>
      <div class="item green animationFadeOut">Verde</div>
      <div class="item red animationFadeInFadeOut">Vermelho</div>
    </section>

    <hr />

    <h2>Spinners</h2>
    <section>
      <div class="item spinner blue animationSpinnerLinear">Linear</div>
      <div class="item spinner green animationSpinnerEase">Ease</div>
      <div class="item spinner red animationSpinnerEaseOut">Ease Out</div>
      <div class="item spinner yellow animationSpinnerEaseInOut">
        Ease In Out
      </div>
    </section>

    <hr />

    <h2>Position</h2>
    <section class="positionBox">
      <div class="item yellow animationPosition">Amarelo</div>
    </section>

    <hr />

    <h2>Content</h2>
    <section>
      <div class="item red animationContent"></div>
    </section>
  </body>
</html>
